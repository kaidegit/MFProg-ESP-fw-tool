name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libxkbcommon-dev

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

      - name: Build release (CLI)
        run: cargo build --release -p mfprog-esp-cli

      - name: Build release (GUI)
        run: cargo build --release -p mfprog-esp-gui

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MFProg-ESP-fw-tool-${{ matrix.os }}
          path: |
            target/release/MFProg-ESP-fw-tool
            target/release/MFProg-ESP-fw-tool.exe

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MFProg-ESP-fw-tool-gui-${{ matrix.os }}
          path: |
            target/release/MFProg-ESP-fw-tool-gui
            target/release/MFProg-ESP-fw-tool-gui.exe
