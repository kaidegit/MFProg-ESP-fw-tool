name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [
          # ubuntu-latest,
          # windows-latest,
          macos-latest,
        ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # - name: Install Linux dependencies
      #   if: runner.os == 'Linux'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y \
      #       libxcb-shape0-dev \
      #       libxcb-xfixes0-dev \
      #       libgl1-mesa-dev \
      #       libfontconfig1-dev \
      #       libxkbcommon-dev

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

      - name: Build release (CLI)
        run: cargo build --release -p mfprog-esp-cli

      - name: Build release (GUI)
        run: cargo build --release -p mfprog-esp-gui

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p dist

          cp target/release/MFProg-ESP-fw-tool \
            dist/MFProg-ESP-fw-tool-${{ matrix.os }}
          cp target/release/MFProg-ESP-fw-tool-gui \
            dist/MFProg-ESP-fw-tool-gui-${{ matrix.os }}

          # if [ "${{ runner.os }}" = "Windows" ]; then
          #   cp target/release/MFProg-ESP-fw-tool.exe \
          #     dist/MFProg-ESP-fw-tool-${{ matrix.os }}.exe
          #   cp target/release/MFProg-ESP-fw-tool-gui.exe \
          #     dist/MFProg-ESP-fw-tool-gui-${{ matrix.os }}.exe
          # else
          #   cp target/release/MFProg-ESP-fw-tool \
          #     dist/MFProg-ESP-fw-tool-${{ matrix.os }}
          #   cp target/release/MFProg-ESP-fw-tool-gui \
          #     dist/MFProg-ESP-fw-tool-gui-${{ matrix.os }}
          # fi

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.os }}
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --generate-notes \
            --verify-tag
